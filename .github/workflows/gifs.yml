name: Record GIFs

# Regenerates the README demo GIFs with vhs and uploads them as a downloadable
# artifact. It never commits: vhs output is not byte-stable and the CI font may
# differ slightly from a local run, so the maintainer reviews the artifact and
# commits the GIFs deliberately.
#
#   • Run manually (Actions → "Record GIFs" → Run workflow) to get fresh GIFs.
#   • On PRs that touch the tapes, the CLI, or the fixtures it also runs, acting
#     as a "the tapes still render" check (the artifact is there if you want it).

on:
  workflow_dispatch:
  pull_request:
    paths:
      - tapes/**
      - killpy/**
      - tester.sh
      - record.sh
      - .github/workflows/gifs.yml

permissions:
  contents: read

concurrency:
  group: record-gifs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  record:
    runs-on: ubuntu-latest
    name: Record GIFs with vhs
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg and a monospace font
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core
          sudo apt-get install -y fonts-jetbrains-mono || true
          sudo fc-cache -f

      - name: Install vhs and ttyd (charm apt repo)
        run: |
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://repo.charm.sh/apt/gpg.key \
            | sudo gpg --dearmor -o /etc/apt/keyrings/charm.gpg
          echo "deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *" \
            | sudo tee /etc/apt/sources.list.d/charm.list
          sudo apt-get update
          sudo apt-get install -y vhs ttyd
          vhs --version

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Install killpy into .venv
        # record.sh auto-detects .venv/bin/killpy and puts it on PATH.
        run: uv sync

      - name: Record all GIFs
        run: ./record.sh

      - name: Upload GIFs
        uses: actions/upload-artifact@v4
        with:
          name: killpy-gifs
          path: docs/gifs/*.gif
          if-no-files-found: error
